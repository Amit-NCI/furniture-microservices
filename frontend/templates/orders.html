{% extends "layout.html" %}

{% block content %}

<h2>My Orders 📦</h2>

<div id="order-list"></div>

<script>
async function loadOrders() {

    let user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        alert("Login required");
        return;
    }

    const res = await fetch(`${ORDER_URL}/api/orders/history/${user.id}`);
    const orders = await res.json();

    const container = document.getElementById("order-list");
    container.innerHTML = "";

    if (orders.length === 0) {
        container.innerHTML = "<p>No orders yet</p>";
        return;
    }

    for (let order of orders) {

        const productRes = await fetch(`${PRODUCT_URL}/api/products/${order.product_id}/`);
        const product = await productRes.json();

        container.innerHTML += `
            <div class="card">
                <img src="${product.image_url}" width="150"/>
                <h3>${product.name}</h3>
                <p><b>€${product.price}</b></p>
                <p>Status: <b>${getStatusBadge(order.status)}</b></p>
            </div>
        `;
    }
}

// 🎨 Status Styling
function getStatusBadge(status) {

    if (status === "placed") return "🟡 Pending";
    if (status === "shipped") return "🚚 Shipped";
    if (status === "delivered") return "✅ Delivered";

    return status;
}

document.addEventListener("DOMContentLoaded", loadOrders);
</script>

{% endblock %}
